groups:
  - name: health-platform-operational
    rules:
      - alert: ApiHighLatencyP95
        expr: histogram_quantile(0.95, sum by (le, route) (rate(hp_api_http_request_duration_seconds_bucket{route=~"payments/checkout-preference|payments/webhooks/mercado-pago|scheduling/internal/release-expired-holds"}[5m]))) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Latencia p95 alta en endpoint crítico"
          description: "La latencia p95 supera 800ms durante 10m."

      - alert: IntegrationErrorsSpike
        expr: sum(rate(hp_api_integration_errors_total[10m])) > 0.05
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Errores de integración sostenidos"
          description: "Hay errores de integración continuos en los últimos 10m."

      - alert: PaymentRejectionsSpike
        expr: sum(rate(hp_api_payments_rejected_total[15m])) > 0.03
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Pagos rechazados por encima del umbral"
          description: "La tasa de rechazo de pagos excede el umbral esperado."

      - alert: WorkerQueueLagHigh
        expr: max by (domain) (hp_worker_queue_lag_ms) > 120000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Lag alto de colas"
          description: "Una cola tiene más de 2 minutos de atraso."

      - alert: ExpectedEventsMissing
        expr: time() - max by (domain) (hp_worker_expected_event_last_timestamp_seconds) > 900
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Ausencia de eventos esperados"
          description: "No se observan eventos esperados por más de 15 minutos."
