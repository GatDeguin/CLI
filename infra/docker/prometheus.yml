global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-alerts.yml

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:3000']

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets: ['worker:9465']
