name: Release Versioned Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version/tag (ej. v1.2.3)'
        required: true

env:
  REGISTRY: ghcr.io
  VERSION: ${{ github.event.inputs.version || github.ref_name }}

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            image: ${{ github.repository_owner }}/api
            dockerfile: services/api/Dockerfile
          - name: worker
            image: ${{ github.repository_owner }}/worker
            dockerfile: services/worker/Dockerfile
          - name: admin-web
            image: ${{ github.repository_owner }}/admin-web
            dockerfile: apps/admin-web/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ matrix.image }}:latest

  patient-mobile-eas:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('apps/patient-mobile/eas.json') != '' }}
    defaults:
      run:
        working-directory: apps/patient-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - name: Setup Expo/EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Publish mobile build (EAS)
        run: eas build --platform all --profile production --non-interactive
